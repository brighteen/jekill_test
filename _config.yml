# Jekyll 설정
title: ymgu
email: brightmgu@gmail.com
description: >- # 이 부분은 사이트 설명으로 채워집니다.
baseurl: "" # username.github.io 루트 레포이므로 서브디렉토리 없음
url: "https://brighteen.github.io" # 사용자 블로그 도메인
github_username: brighteen
twitter_username: bright_mgu # If applicable, otherwise remove

# 테마 설정
theme: minima

# Collections 설정 (중요)
collections:
  notes:
    output: true
    permalink: /notes/:path/
  mml:
    output: true
    permalink: /mml/:path/
  research:
    output: true
    permalink: /research/:path/
  genai:
    output: true
    permalink: /genai/:path/

# 빌드 설정
markdown: kramdown
kramdown:
  math_engine: mathjax
  syntax_highlighter: rouge
  hard_wrap: true
highlighter: rouge
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# 한글 파일명 처리를 위한 설정
encoding: utf-8

# 추가 무시 파일 (기존 백업 폴더들)
exclude:
  - Gemfile
  - Gemfile.lock
  - migrate_to_jekyll.py
  - migrate_new_content.py
  - .agent/
  - README.md
  - MML/
  - Note/
  - Research/
  - GenAI/
  - _temp_site/
  - _temp_site_trace/

# 문서별 기본 속성 (Frontmatter) 자동 지정
defaults:
  - scope:
      path: ""
      type: "mml"
    values:
      layout: "sidebar"
      collection_name: "mml"
  - scope:
      path: ""
      type: "notes"
    values:
      layout: "sidebar"
      collection_name: "notes"
  - scope:
      path: ""
      type: "research"
    values:
      layout: "sidebar"
      collection_name: "research"
  - scope:
      path: ""
      type: "genai"
    values:
      layout: "sidebar"
      collection_name: "genai"
